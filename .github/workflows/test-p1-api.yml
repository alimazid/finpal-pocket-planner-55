name: P1 API Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'

jobs:
  api-tests:
    name: P1 Auth API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pocketpenny_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Setup .env for tests
        working-directory: apps/backend
        run: |
          cat > .env << EOF
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/pocketpenny_test
          JWT_SECRET=test-secret-for-ci-only
          JWT_REFRESH_SECRET=test-refresh-secret-for-ci-only
          JWT_EXPIRES_IN=15m
          JWT_REFRESH_EXPIRES_IN=7d
          NODE_ENV=test
          PORT=3002
          FRONTEND_URL=pocketpenny://
          LOGIN_MAX_ATTEMPTS=5
          LOGIN_LOCKOUT_SECONDS=60
          EOF

      - name: Run Prisma migrations
        working-directory: apps/backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pocketpenny_test

      - name: Start backend
        working-directory: apps/backend
        run: |
          npm run dev &
          # Wait for backend to be ready (up to 30s)
          for i in $(seq 1 15); do
            curl -sf http://localhost:3002/api/health && break
            echo "Waiting for backend... ($i/15)"
            sleep 2
          done

      - name: Run P1 API integration tests
        working-directory: apps/backend
        run: npm run test:api -- --ci --forceExit
        env:
          BACKEND_URL: http://localhost:3002
          NODE_ENV: test
